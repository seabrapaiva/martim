<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Desafio 1 – Sujeitos, Predicados e Complementos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
    h1 { margin-bottom: 5px; }
    #info { margin-bottom: 15px; color: #555; }
    #perguntaBox { border: 1px solid #ccc; border-radius: 8px; padding: 20px; max-width: 800px; margin: 0 auto 20px; }
    #frase { font-style: italic; margin: 10px 0 15px; }
    .opcaoBtn {
      display: block;
      margin: 6px auto;
      padding: 8px 14px;
      max-width: 400px;
      width: 100%;
      border-radius: 6px;
      border: 1px solid #888;
      background: #f5f5f5;
      cursor: pointer;
      text-align: left;
    }
		a {
			font-weight: bold;
			font-size: 20px;
		}
    .opcaoBtn:hover { background: #e8e8e8; }
    .opcaoCerta { background: #c8f7c5 !important; border-color: #2ecc71 !important; }
    .opcaoErrada { background: #f7c5c5 !important; border-color: #e74c3c !important; }
    #cronometro { font-weight: bold; margin-bottom: 10px; }
    #progresso { margin-bottom: 10px; }
    #resultadoFinal { margin-top: 20px; font-weight: bold; white-space: pre-line; }
    #btnProxima, #btnReiniciar {
      padding: 8px 16px;
      margin: 8px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
    }
    #btnProxima { background: #3498db; color: white; }
    #btnProxima:disabled { background: #95a5a6; cursor: default; }
    #btnReiniciar { background: #27ae60; color: white; }
  </style>
</head>
<body>

<h1>Desafio 1 – Sujeitos, Predicados e Complementos</h1>
<div id="info">Cada desafio tem 4 perguntas aleatórias. Tens 60 segundos. Dá o teu melhor.</div>

<div id="cronometro">Tempo: 60s</div>
<div id="progresso"></div>

<div id="perguntaBox">
  <div id="textoPergunta"></div>
  <div id="frase"></div>
  <div id="opcoes"></div>
</div>

<button id="btnProxima" disabled>Próxima</button>
<button id="btnReiniciar">Novo desafio</button>
<br>
<button id="btnProxima" ><a href="desafio2.html">Funções Sintáticas</a></button>&#8667;

<div id="resultadoFinal"></div>

<script>
const todasPerguntas = [
  {
    pergunta: "Identifica o sujeito:",
    frase: "Os alunos estudaram a lição.",
    opcoes: ["Os alunos", "estudaram", "a lição"],
    correta: 0
  },
  {
    pergunta: "Identifica o predicado:",
    frase: "A Maria ofereceu um presente.",
    opcoes: ["A Maria", "ofereceu", "um presente"],
    correta: 1
  },
  {
    pergunta: "Qual é o complemento direto?",
    frase: "O João leu o livro.",
    opcoes: ["O João", "leu", "o livro"],
    correta: 2
  },
  {
    pergunta: "Qual é o complemento indireto?",
    frase: "A Ana telefonou ao amigo.",
    opcoes: ["ao amigo", "telefonou", "A Ana"],
    correta: 0
  },
  {
    pergunta: "Qual é o complemento oblíquo?",
    frase: "O Pedro correu no parque.",
    opcoes: ["correu", "no parque", "O Pedro"],
    correta: 1
  },
  {
    pergunta: "Identifica o núcleo do sujeito:",
    frase: "Os alunos da turma B chegaram cedo.",
    opcoes: ["alunos", "turma", "chegaram"],
    correta: 0
  },
  {
    pergunta: "Identifica o predicado:",
    frase: "A Maria estava a estudar.",
    opcoes: ["estava", "Maria", "a estudar"],
    correta: 0
  },
  {
    pergunta: "Qual é o complemento direto?",
    frase: "O professor corrigiu os testes.",
    opcoes: ["O professor", "corrigiu", "os testes"],
    correta: 2
  },
  {
    pergunta: "Identifica o predicado:",
    frase: "O cão dormiu no tapete.",
    opcoes: ["O cão", "dormiu", "no tapete"],
    correta: 1
  },
  {
    pergunta: "Identifica o sujeito:",
    frase: "Chegaram cedo os atletas.",
    opcoes: ["Chegaram cedo", "cedo", "os atletas"],
    correta: 2
  }
];

let perguntasSelecionadas = [];
let indiceAtual = 0;
let respostasCertas = 0;
let tempo = 60;
let intervalo = null;
let bloqueado = false;

function baralhar(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function escolher4Perguntas() {
  const copia = [...todasPerguntas];
  baralhar(copia);
  return copia.slice(0, 4);
}

function atualizarCronometro() {
  document.getElementById('cronometro').textContent = `Tempo: ${tempo}s`;
}

function iniciarCronometro() {
  clearInterval(intervalo);
  tempo = 60;
  atualizarCronometro();
  intervalo = setInterval(() => {
    tempo--;
    atualizarCronometro();
    if (tempo <= 0) {
      tempo = 0;
      atualizarCronometro();
      clearInterval(intervalo);
      terminarDesafio(true);
    }
  }, 1000);
}

function mostrarPergunta() {
  const q = perguntasSelecionadas[indiceAtual];
  document.getElementById('textoPergunta').textContent = q.pergunta;
  document.getElementById('frase').textContent = `Frase: "${q.frase}"`;
  document.getElementById('progresso').textContent =
    `Pergunta ${indiceAtual + 1} de ${perguntasSelecionadas.length}`;
  const opcoesDiv = document.getElementById('opcoes');
  opcoesDiv.innerHTML = "";
  bloqueado = false;
  document.getElementById('btnProxima').disabled = true;

  q.opcoes.forEach((op, idx) => {
    const btn = document.createElement('button');
    btn.textContent = String.fromCharCode(65 + idx) + ") " + op;
    btn.className = "opcaoBtn";
    btn.onclick = () => escolherOpcao(idx, btn);
    opcoesDiv.appendChild(btn);
  });
}

function escolherOpcao(indiceOpcao, botao) {
  if (bloqueado) return;
  bloqueado = true;
  const q = perguntasSelecionadas[indiceAtual];
  const opcoesBtns = document.querySelectorAll('.opcaoBtn');

  opcoesBtns.forEach((b, i) => {
    if (i === q.correta) {
      b.classList.add('opcaoCerta');
    }
    if (i === indiceOpcao && i !== q.correta) {
      b.classList.add('opcaoErrada');
    }
    b.disabled = true;
  });

  if (indiceOpcao === q.correta) {
    respostasCertas++;
  }

  document.getElementById('btnProxima').disabled = false;
}

function proximaPergunta() {
  indiceAtual++;
  if (indiceAtual >= perguntasSelecionadas.length) {
    terminarDesafio(false);
  } else {
    mostrarPergunta();
  }
}

function terminarDesafio(porTempo) {
  clearInterval(intervalo);
  bloqueado = true;
  document.getElementById('btnProxima').disabled = true;

  const total = perguntasSelecionadas.length;
  const percent = Math.round((respostasCertas / total) * 100);
  let mensagem;

  if (percent >= 90) {
    mensagem = "Boa Martim! Dominas este tema!";
  } else if (percent >= 70) {
    mensagem = "Muito bom, filhote! Estás quase no topo!";
  } else if (percent >= 50) {
    mensagem = "Bom esforço! Tenta melhorar!";
  } else {
    mensagem = "Desafio falhado… tenta outra vez!";
  }

  let texto = `Resultado: ${respostasCertas} em ${total} (${percent}%).\n${mensagem}`;
  if (porTempo) {
    texto += "\n(O tempo acabou!)";
  }

  document.getElementById('resultadoFinal').textContent = texto;
}

function iniciarDesafio() {
  perguntasSelecionadas = escolher4Perguntas();
  indiceAtual = 0;
  respostasCertas = 0;
  document.getElementById('resultadoFinal').textContent = "";
  mostrarPergunta();
  iniciarCronometro();
}

document.getElementById('btnProxima').addEventListener('click', proximaPergunta);
document.getElementById('btnReiniciar').addEventListener('click', iniciarDesafio);

iniciarDesafio();
</script>

</body>
</html>
