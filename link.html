<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Vacancies</title>
		<style>
		body { 
			font-family: -apple-system, sans-serif; 
			padding: 40px; background: #f4f4f9; 
			}
		.grid { 
			display: grid; 
			grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 15px;
			}
		.opt1 {
			background: grey; 
			}
		.opt2 {
			background: blue; 
			}
		.opt3 {
			background: brown; 
			}
		.opt4 {
			background: lightblue; 
			}
		.opt5 {
			background: red; 
			}
		.btn {  
			padding: 10px; 
			text-align: center; 
			border: 3px solid #ddd; 
			border-radius: 15px; 
			text-decoration: none; 
			color: #333; 
			font-weight: bold; 
			transition: 0.2s;
			font-size: 50px;
			}
		.btn:hover { 
			border-color: #007bff;
			background: #f0f7ff; 
			transform: translateY(-2px); 
		}
		</style>
	</head>
	<body>
		<div class="container1"><div id="link-grid1" class="grid"></div></div>
		<hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
		<div class="container2"><div id="link-grid2" class="grid"></div></div>
		<hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
		<div class="container3"><div id="link-grid3" class="grid"></div></div>
		<hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
		<div class="container4"><div id="link-grid4" class="grid"></div></div>
		<hr style="border:0; border-top:1px solid #ccc; margin:15px 0;">
		<div class="container5"><div id="link-grid5" class="grid"></div></div>
		<script>
			const links1 = [
				{ name: "NATO", url: "https://nato.taleo.net/careersection/2/jobsearch.ftl" },
				{ name: "EU", url: "https://eu-careers.europa.eu/en/temporary-agents-other-institutions-vacancies" },
				{ name: "NETCompany", url: "https://netcompany.com/careers/vacancies/" },
				{ name: "EID", url: "https://www.eid.pt/career-opportunities/" }
			];
			const container1 = document.getElementById('link-grid1');
			
			container1.innerHTML = links1.map(link => `
				<a href="${link.url}" target="_blank" class="btn opt1">
						${link.name}
				</a>
			`).join('');
		</script>

</html>
